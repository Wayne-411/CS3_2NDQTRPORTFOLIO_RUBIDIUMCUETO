<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Add a Movie</title>

    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #f7a7a7, #9e5757);
            margin: 0;
        }

        .container {
            width: 1000px;
            margin: 60px auto;
            background: rgb(255, 245, 245);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgb(0, 0, 0);
        }

        h2 {
            text-align: center;
            color: #c76a79;
            margin-bottom: 20px;
        }

        label {
            font-weight: 600;
        }

        input,
        select {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            margin-bottom: 18px;
            border-radius: 6px;
            border: 1px solid #dd9090;
            font-size: 14px;
        }

        input:focus,
        select:focus {
            outline: none;
            border: 1px solid #e48796;
        }

        button {
            padding: 6px 12px;
            background: #f76d84;
            color: rgb(255, 255, 255);
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #7b1b2c;
        }

        .submit-btn {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
        }

        .stars {
            margin-bottom: 15px;
        }

        .stars span {
            font-size: 28px;
            cursor: pointer;
            color: lightgray;
            transition: 0.2s;
        }

        .stars span:hover {
            transform: scale(1.2);
        }

        .stars .active {
            color: gold;
        }

        .movie-item {
            background: #f3f3f3;
            padding: 12px;
            margin-top: 12px;
            border-radius: 8px;
            border-left: 5px solid #df7e8e;
            font-size: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .movie-info {
            flex: 1;
        }

        .delete-btn {
            margin-left: 10px;
        }
    </style>
</head>

<body>

    <div class="container">

        <h2>Add / Update a Movie Rating</h2>

        <form id="movieForm">

            <label>Title:</label>
            <input type="text" id="title" required>

            <label>Year:</label>
            <input type="number" id="year" required>

            <label>Genre:</label>
            <select id="genre">
                <option>Action</option>
                <option>Comedy</option>
                <option>Drama</option>
                <option>Horror</option>
                <option>Romance</option>
            </select>

            <label>Rating:</label>

            <div class="stars" id="starRating">
                <span data-value="1">★</span>
                <span data-value="2">★</span>
                <span data-value="3">★</span>
                <span data-value="4">★</span>
                <span data-value="5">★</span>
            </div>

            <button type="submit" class="submit-btn">Add Movie</button>

        </form>

        <h2>Movie List</h2>

        <div id="movieList"></div>

    </div>

    <script>

        let rating = 0;
        const stars = document.querySelectorAll("#starRating span");

        stars.forEach(star => {
            star.addEventListener("click", function () {
                rating = this.dataset.value;
                stars.forEach(s => s.classList.remove("active"));
                for (let i = 0; i < rating; i++) {
                    stars[i].classList.add("active");
                }
            });
        });

        function loadMovies() {

            const movieList = document.getElementById("movieList");
            movieList.innerHTML = "";

            let movies = JSON.parse(localStorage.getItem("movies")) || [];

            movies.forEach((movie, index) => {

                let starDisplay = "★".repeat(movie.rating);

                const div = document.createElement("div");
                div.className = "movie-item";

                div.innerHTML = `
<div class="movie-info">
${movie.title} (${movie.year}) - ${movie.genre}, Rating: <span style="color:gold">${starDisplay}</span>
</div>
<button class="delete-btn" onclick="deleteMovie(${index})">Delete</button>
`;

                movieList.appendChild(div);

            });

        }

        function deleteMovie(index) {

            let confirmDelete = confirm("Are you sure you want to delete?");

            if (confirmDelete) {

                let movies = JSON.parse(localStorage.getItem("movies")) || [];

                movies.splice(index, 1);

                localStorage.setItem("movies", JSON.stringify(movies));

                loadMovies();

            }

        }

        document.getElementById("movieForm").addEventListener("submit", function (e) {

            e.preventDefault();

            if (rating == 0) {
                alert("Please select a rating.");
                return;
            }

            const title = document.getElementById("title").value;
            const year = document.getElementById("year").value;
            const genre = document.getElementById("genre").value;

            let movies = JSON.parse(localStorage.getItem("movies")) || [];

            let existing = movies.find(movie => movie.title.toLowerCase() === title.toLowerCase());

            if (existing) {

                existing.rating = Math.round((parseInt(existing.rating) + parseInt(rating)) / 2);
                existing.year = year;
                existing.genre = genre;

            } else {

                const newMovie = {
                    title: title,
                    year: year,
                    genre: genre,
                    rating: rating
                };

                movies.push(newMovie);

            }

            localStorage.setItem("movies", JSON.stringify(movies));

            this.reset();

            rating = 0;

            stars.forEach(s => s.classList.remove("active"));

            loadMovies();

        });

        loadMovies();

    </script>

</body>

</html>
