<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Add a Movie</title>

    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #6b0e0e, #1c1c1c);
            margin: 0;
        }

        .container {
            width: 920px;
            margin: 60px auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        h2 {
            text-align: center;
            color: #5c101d;
            margin-bottom: 20px;
        }

        label {
            font-weight: 600;
        }

        input,
        select {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            margin-bottom: 18px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        input:focus,
        select:focus {
            outline: none;
            border: 1px solid #5c101d;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #5c101d;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #7b1b2c;
            transform: scale(1.02);
        }

        .stars {
            margin-bottom: 15px;
        }

        .stars span {
            font-size: 28px;
            cursor: pointer;
            color: lightgray;
            transition: 0.2s;
        }

        .stars span:hover {
            transform: scale(1.2);
        }

        .stars .active {
            color: gold;
        }

        .movie-item {
            background: #f3f3f3;
            padding: 12px;
            margin-top: 12px;
            border-radius: 8px;
            border-left: 5px solid #5c101d;
            font-size: 15px;
        }
    </style>

</head>

<body>

    <div class="container">

        <h2>Add a Movie</h2>

        <form id="movieForm">

            <label>Title:</label>
            <input type="text" id="title" required>

            <label>Year:</label>
            <input type="number" id="year" required>

            <label>Genre:</label>
            <select id="genre">
                <option>Action</option>
                <option>Comedy</option>
                <option>Drama</option>
                <option>Horror</option>
                <option>Romance</option>
            </select>

            <label>Rating:</label>

            <div class="stars" id="starRating">
                <span data-value="1">★</span>
                <span data-value="2">★</span>
                <span data-value="3">★</span>
                <span data-value="4">★</span>
                <span data-value="5">★</span>
            </div>

            <button type="submit">Add Movie</button>

        </form>

        <h2>Movie List</h2>

        <div id="movieList"></div>

    </div>

    <script>

        let rating = 0;
        const stars = document.querySelectorAll("#starRating span");

        stars.forEach(star => {
            star.addEventListener("click", function () {
                rating = this.dataset.value;
                stars.forEach(s => s.classList.remove("active"));
                for (let i = 0; i < rating; i++) {
                    stars[i].classList.add("active");
                }
            });
        });

        function loadMovies() {
            const movieList = document.getElementById("movieList");
            movieList.innerHTML = "";
            let movies = JSON.parse(localStorage.getItem("movies")) || [];

            movies.forEach(movie => {
                let starDisplay = "★".repeat(movie.rating);
                const div = document.createElement("div");
                div.className = "movie-item";
                div.innerHTML =
                    `${movie.title} (${movie.year}) - ${movie.genre}, Rating: <span style="color:gold">${starDisplay}</span>`;
                movieList.appendChild(div);
            });
        }

        document.getElementById("movieForm").addEventListener("submit", function (e) {
            e.preventDefault();

            if (rating == 0) {
                alert("Please select a rating.");
                return;
            }

            const title = document.getElementById("title").value;
            const year = document.getElementById("year").value;
            const genre = document.getElementById("genre").value;

            const newMovie = {
                title: title,
                year: year,
                genre: genre,
                rating: rating
            };

            let movies = JSON.parse(localStorage.getItem("movies")) || [];
            movies.push(newMovie);
            localStorage.setItem("movies", JSON.stringify(movies));

            this.reset();
            rating = 0;
            stars.forEach(s => s.classList.remove("active"));

            loadMovies();
        });

        loadMovies();

    </script>

</body>

</html>
