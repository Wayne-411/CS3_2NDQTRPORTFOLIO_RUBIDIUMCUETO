<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Add a Movie</title>

    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-image: url("https://cdn.answeroverflow.com/1185567417632575588/image.png");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding-left: 80px;
        }

        .container {
            width: 1000px;
            background: rgba(250, 235, 211, 0.95);
            padding: 50px;
            border-radius: 102px;
            box-shadow: 0 10px 50px rgb(245, 144, 28);
            margin-top: -300px;
        }

        h2 {
            text-align: center;
            color: #9c6112;
            margin-bottom: 20px;
        }

        label {
            font-weight: 600;
        }

        input,
        select {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            margin-bottom: 18px;
            border-radius: 6px;
            border: 1px solid #aa7228;
            font-size: 14px;
        }

        input:focus,
        select:focus {
            outline: none;
            border: 1px solid #e4a452;
        }

        button {
            padding: 6px 12px;
            background: #f7bb6d;
            color: rgb(0, 0, 0);
            border: none;
            border-radius: 6px;
            font-size: 20px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #ff8d0c;
        }

        .submit-btn {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
        }

        .stars {
            margin-bottom: 15px;
        }

        .stars span {
            font-size: 28px;
            cursor: pointer;
            color: lightgray;
            transition: 0.2s;
        }

        .stars span:hover {
            transform: scale(1.2);
        }

        .stars .active {
            color: rgb(139, 85, 14);
        }

        .movie-item {
            background: #f8e3bb;
            padding: 12px;
            margin-top: 12px;
            border-radius: 8px;
            border-left: 5px solid #946809;
            font-size: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .movie-info {
            flex: 1;
        }

        .delete-btn {
            margin-left: 10px;
        }

        .list-stars {
            color: rgb(139, 85, 14);
        }
    </style>
</head>

<body>

    <div class="container">

        <h2>The MovieTracker, looks better on 80% zoom</h2>

        <form id="movieForm">

            <label>Title:</label>
            <input type="text" id="title" required>

            <label>Year:</label>
            <input type="number" id="year" required>

            <label>Genre:</label>
            <select id="genre">
                <option>Action</option>
                <option>Comedy</option>
                <option>Drama</option>
                <option>Horror</option>
                <option>Romance</option>
            </select>

            <label>Rating:</label>

            <div class="stars" id="starRating">
                <span data-value="1">★</span>
                <span data-value="2">★</span>
                <span data-value="3">★</span>
                <span data-value="4">★</span>
                <span data-value="5">★</span>
            </div>

            <button type="submit" class="submit-btn">Add Movie</button>

        </form>

        <h2>Movie List</h2>

        <div id="movieList"></div>

    </div>

    <script>

        let rating = 0;
        const stars = document.querySelectorAll("#starRating span");

        stars.forEach(star => {
            star.addEventListener("click", function () {
                rating = this.dataset.value;
                stars.forEach(s => s.classList.remove("active"));
                for (let i = 0; i < rating; i++) {
                    stars[i].classList.add("active");
                }
            });
        });

        function loadMovies() {

            const movieList = document.getElementById("movieList");
            movieList.innerHTML = "";

            let movies = JSON.parse(localStorage.getItem("movies")) || [];

            movies.forEach((movie, index) => {

                let starDisplay = "★".repeat(movie.rating);

                const div = document.createElement("div");
                div.className = "movie-item";

                div.innerHTML = `
<div class="movie-info">
${movie.title} (${movie.year}) - ${movie.genre}, Rating: <span class="list-stars">${starDisplay}</span>
</div>
<button class="delete-btn" onclick="deleteMovie(${index})">Delete</button>
`;

                movieList.appendChild(div);

            });

        }

        function deleteMovie(index) {

            let confirmDelete = confirm("Are you sure you want to delete?");

            if (confirmDelete) {

                let movies = JSON.parse(localStorage.getItem("movies")) || [];

                movies.splice(index, 1);

                localStorage.setItem("movies", JSON.stringify(movies));

                loadMovies();

            }

        }

        document.getElementById("movieForm").addEventListener("submit", function (e) {

            e.preventDefault();

            if (rating == 0) {
                alert("Please select a rating.");
                return;
            }

            const title = document.getElementById("title").value;
            const year = document.getElementById("year").value;
            const genre = document.getElementById("genre").value;

            let movies = JSON.parse(localStorage.getItem("movies")) || [];

            let existing = movies.find(movie => movie.title.toLowerCase() === title.toLowerCase());

            if (existing) {

                existing.rating = Math.round((parseInt(existing.rating) + parseInt(rating)) / 2);
                existing.year = year;
                existing.genre = genre;

            } else {

                const newMovie = {
                    title: title,
                    year: year,
                    genre: genre,
                    rating: rating
                };

                movies.push(newMovie);

            }

            localStorage.setItem("movies", JSON.stringify(movies));

            this.reset();

            rating = 0;

            stars.forEach(s => s.classList.remove("active"));

            loadMovies();

        });

        loadMovies();

    </script>

</body>

</html>
